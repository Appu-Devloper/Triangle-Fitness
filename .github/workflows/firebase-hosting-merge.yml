name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Clean Flutter
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: flutter build web --release

      - name: Create Firebase service account file
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRIANGLE_FITNESS }}' > firebase-service-account.json

      - name: Deploy to Firebase Hosting
        run: |
          set +e
          npx firebase-tools@15.22.3 deploy --only hosting --project triangle-fitness --non-interactive 2>&1 | tee firebase-deploy.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "supplied version .* is the current active version" firebase-deploy.log; then
            echo "Firebase Hosting already has this version active; treating deploy as successful."
            exit 0
          fi

          exit "$status"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
