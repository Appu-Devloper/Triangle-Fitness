      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          set +e

          OUTPUT=$(npx firebase-tools@15.22.3 deploy --only hosting --project triangle-fitness --non-interactive 2>&1)
          STATUS=$?

          echo "$OUTPUT"

          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "is the current active version"; then
              echo "Firebase Hosting version is already active. Treating deploy as successful."
              exit 0
            fi

            exit $STATUS
          fi
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json